<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Eye exercise</title>
    <script src="html/js/jquery.min.js"></script>
</head>
<body>
<style>
    canvas {
      display: block;
      margin: 0 auto;
      border: 1px solid rgb(0, 255, 179);
    }
  </style>
  <canvas id="canvas" width="700" height="700"></canvas>
  <script>
    var canv = document.getElementById("canvas");
    var ctx = canv.getContext("2d");
    var width = 700;
    var height = width;
    // 创建一个小球对象
    var ball = {
      x: 100,
      y: 100,
      radius: 20,
      xSpeed: -(Math.random() + 1).toFixed(2),
      ySpeed: -(Math.random() + 1).toFixed(2),
      incrementSpeed: 0.1,
      maxSpeed: -9
    };
    // 定义绘制小球的方法
    ball.draw = function () {
      ctx.beginPath();
      ctx.arc(this.x, this.y, 20, 0, Math.PI * 2, true);
      ctx.fillStyle = "rgb(29, 192, 143)"
      ctx.fill();
    };
    // 定义小球运动的方法
    ball.move = function () {
      this.x = this.x + this.xSpeed;
      this.y = this.y + this.ySpeed;
    };
    // 边界判断
    ball.checkCanvas = function () {
      if (this.x < this.radius || this.x > width - this.radius) {
        this.xSpeed = this.xSpeed < 0 && this.xSpeed > this.maxSpeed ? this.xSpeed - this.incrementSpeed : this.xSpeed;
        this.xSpeed = -this.xSpeed;
      }
      if (this.y < this.radius || this.y > height - this.radius) {
        this.ySpeed = this.ySpeed < 0 && this.ySpeed > this.maxSpeed ? this.ySpeed - this.incrementSpeed : this.ySpeed;
        this.ySpeed = -this.ySpeed;
        console.log("x: " + this.xSpeed + ", y:" + this.ySpeed)
      }
    };
    // 定时功能使得小球动起来, 每30ms执行一次
    setInterval(function () {
      ctx.clearRect(0, 0, width, height);
      ball.draw();
      ball.move();
      ball.checkCanvas();
      ctx.strokeRect(0, 0, width, height);
    }, 5);
  </script>
</body>
</html>
